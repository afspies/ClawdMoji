name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the Slack-ready pack
        run: python3 tools/build_pack.py
      - uses: softprops/action-gh-release@v2
        with:
          files: build/clawdmoji-pack.zip
          generate_release_notes: true
