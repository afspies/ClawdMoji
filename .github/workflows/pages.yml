# Deploys docs/ to GitHub Pages via Actions (build_type: workflow) — the
# legacy branch-build queue stalled repeatedly, so we upload the artifact
# and deploy it ourselves.
name: pages

on:
  push:
    branches: [main]
    paths: ["docs/**"]
  workflow_dispatch:
  # self-healing: GitHub's Pages deployment queue has been known to stall
  # (2026-07-02 it ate five consecutive deploys) — retry on a timer, but
  # skip the deploy when the site is already up.
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    outputs:
      live: ${{ steps.check.outputs.live }}
    steps:
      - id: check
        run: echo "live=$(curl -s -o /dev/null -w '%{http_code}' https://afspies.github.io/ClawdMoji/)" >> "$GITHUB_OUTPUT"

  deploy:
    needs: probe
    # scheduled runs only deploy while the site is down; pushes always deploy
    if: github.event_name != 'schedule' || needs.probe.outputs.live != '200'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
